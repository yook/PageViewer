<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - PageViewer</title>
    <link rel="icon" type="image/x-icon" href="assets/page-viewer-logo.png">
    <link rel="stylesheet" href="style.css?v=5">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#0ea5e9',
                        },
                    }
                }
            }
        }
    </script>
</head>
<body class="auth-page text-gray-800">
    <main class="auth-main">
        <div class="auth-shell">
            <section class="auth-card">
                <a href="/" class="mb-8 flex items-center justify-center space-x-3 text-center">
                    <img src="assets/page-viewer-logo.png" alt="Логотип PageViewer" class="h-9 w-9">
                    <span class="text-2xl font-bold text-gray-800">PageViewer</span>
                </a>
                <div class="auth-panel">
                    <h2 class="auth-card-title text-center">Введите email для входа</h2>

                    <form class="auth-form">
                        <div class="auth-alert" data-form-alert hidden></div>

                        <label class="auth-field">
                            <span class="auth-label">Email</span>
                            <input class="auth-input" type="email" name="login-email" placeholder="you@example.com" data-field="email">
                            <span class="auth-error" data-error-for="email"></span>
                        </label>

                        <label class="auth-field">
                            <span class="auth-label">Пароль</span>
                            <input class="auth-input" type="password" name="login-password" placeholder="Введите пароль" data-field="password">
                            <span class="auth-error" data-error-for="password"></span>
                        </label>

                        <div class="auth-form-row">
                            <a href="forgot-password.html" class="auth-link">Забыли пароль?</a>
                        </div>

                        <button class="auth-button" type="submit">Войти</button>

                        <div class="auth-divider">или</div>

                        <p class="auth-footnote">Нет аккаунта? <a href="register.html" class="auth-link">Зарегистрироваться</a></p>
                    </form>
                </div>

            </section>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        feather.replace();

        const loginForm = document.querySelector('.auth-form');
        const emailInput = loginForm?.querySelector('[data-field="email"]');
        const passwordInput = loginForm?.querySelector('[data-field="password"]');
        const loginSubmit = loginForm?.querySelector('[type="submit"]');
        const loginAlert = loginForm?.querySelector('[data-form-alert]');

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        const setError = (input, message) => {
            const error = loginForm?.querySelector(`[data-error-for="${input.dataset.field}"]`);
            input.classList.toggle('is-invalid', Boolean(message));
            if (error) {
                error.textContent = message || '';
                error.classList.toggle('is-visible', Boolean(message));
            }
        };

        const setFormAlert = (message, type = 'error') => {
            if (!loginAlert) return;
            loginAlert.hidden = !message;
            loginAlert.textContent = message || '';
            loginAlert.className = `auth-alert auth-alert-${type}`;
        };

        const setLoading = (isLoading) => {
            if (!loginSubmit) return;
            loginSubmit.disabled = isLoading;
            loginSubmit.classList.toggle('is-loading', isLoading);
            loginSubmit.textContent = isLoading ? 'Входим...' : 'Войти';
        };

        const redirectAuthenticatedUser = async () => {
            if (!window.PageViewerAuth.isAuthenticated()) {
                return false;
            }

            try {
                await window.PageViewerAuth.getValidAccessToken();
                window.location.href = 'account.html';
                return true;
            } catch {
                window.PageViewerAuth.clearTokens();
                return false;
            }
        };

        const showUnverifiedEmail = () => {
            if (!loginAlert) return;
            loginAlert.hidden = false;
            loginAlert.className = 'auth-alert auth-alert-warning';
            loginAlert.innerHTML = `
                <span>Email не подтвержден. Проверьте почту или отправьте письмо повторно.</span>
                <button class="auth-inline-button" type="button" data-resend-verification>Отправить письмо</button>
            `;

            loginAlert.querySelector('[data-resend-verification]')?.addEventListener('click', async (event) => {
                const button = event.currentTarget;
                button.disabled = true;
                button.textContent = 'Отправляем...';
                try {
                    const data = await window.PageViewerAuth.resendVerification(emailInput.value.trim());
                    const devLink = data?.verificationToken
                        ? ` <a class="auth-link" href="verify-email.html?token=${encodeURIComponent(data.verificationToken)}">Открыть dev-ссылку</a>`
                        : '';
                    loginAlert.className = 'auth-alert auth-alert-success';
                    loginAlert.innerHTML = `Если аккаунт найден и email не подтвержден, мы отправим письмо повторно.${devLink}`;
                } catch (error) {
                    const normalized = window.PageViewerAuth.normalizeError(error);
                    setFormAlert(normalized.message, 'error');
                } finally {
                    button.disabled = false;
                    button.textContent = 'Отправить письмо';
                }
            });
        };

        const validateEmail = () => {
            const value = emailInput.value.trim();
            if (!value) {
                setError(emailInput, 'Введите email');
                return false;
            }
            if (!emailPattern.test(value)) {
                setError(emailInput, 'Введите корректный email');
                return false;
            }
            setError(emailInput, '');
            return true;
        };

        const validatePassword = () => {
            const value = passwordInput.value;
            if (!value) {
                setError(passwordInput, 'Введите пароль');
                return false;
            }
            setError(passwordInput, '');
            return true;
        };

        emailInput?.addEventListener('blur', validateEmail);
        emailInput?.addEventListener('input', () => {
            if (emailInput.classList.contains('is-invalid')) validateEmail();
        });

        passwordInput?.addEventListener('blur', validatePassword);
        passwordInput?.addEventListener('input', () => {
            if (passwordInput.classList.contains('is-invalid')) validatePassword();
        });

        loginForm?.addEventListener('submit', (event) => {
            event.preventDefault();
            setFormAlert('');
            const isEmailValid = validateEmail();
            const isPasswordValid = validatePassword();
            if (!isEmailValid || !isPasswordValid) {
                return;
            }

            setLoading(true);
            window.PageViewerAuth.login(emailInput.value.trim(), passwordInput.value)
                .then((data) => {
                    window.PageViewerAuth.setTokens(data);
                    window.location.href = window.PageViewerAuth.consumePostLoginRedirect() || window.PageViewerAuth.resolveAppUrl('/');
                })
                .catch((error) => {
                    const normalized = window.PageViewerAuth.normalizeError(error);
                    if (normalized.code === 'email_not_verified') {
                        showUnverifiedEmail();
                        return;
                    }
                    setFormAlert(normalized.message, 'error');
                })
                .finally(() => {
                    setLoading(false);
                });
        });

        redirectAuthenticatedUser();
    </script>
</body>
</html>
