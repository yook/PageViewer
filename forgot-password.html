<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля - PageViewer</title>
    <link rel="icon" type="image/x-icon" href="assets/page-viewer-logo.png">
    <link rel="stylesheet" href="style.css?v=5">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#0ea5e9',
                        },
                    }
                }
            }
        }
    </script>
</head>
<body class="auth-page text-gray-800">
    <main class="auth-main">
        <div class="auth-shell">
            <section class="auth-card">
                <a href="/" class="mb-8 flex items-center justify-center space-x-3 text-center">
                    <img src="assets/page-viewer-logo.png" alt="Логотип PageViewer" class="h-9 w-9">
                    <span class="text-2xl font-bold text-gray-800">PageViewer</span>
                </a>
                <h2 class="auth-card-title text-center">Введите email для восстановления пароля</h2>

                <form class="auth-form">
                    <div class="auth-alert" data-form-alert hidden></div>

                    <label class="auth-field">
                        <span class="auth-label">Email</span>
                        <input class="auth-input" type="email" name="forgot-email" placeholder="you@example.com" data-field="email">
                        <span class="auth-error" data-error-for="email"></span>
                    </label>

                    <button class="auth-button" type="submit">Отправить ссылку</button>

                    <div class="auth-divider">или</div>

                    <p class="auth-footnote">Вспомнили пароль? <a href="login.html" class="auth-link">Войти</a></p>
                </form>
            </section>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        feather.replace();

        const forgotForm = document.querySelector('.auth-form');
        const forgotEmailInput = forgotForm?.querySelector('[data-field="email"]');
        const forgotSubmit = forgotForm?.querySelector('[type="submit"]');
        const forgotAlert = forgotForm?.querySelector('[data-form-alert]');
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        const setError = (input, message) => {
            const error = forgotForm?.querySelector(`[data-error-for="${input.dataset.field}"]`);
            input.classList.toggle('is-invalid', Boolean(message));
            if (error) {
                error.textContent = message || '';
                error.classList.toggle('is-visible', Boolean(message));
            }
        };

        const setFormAlert = (message, type = 'error') => {
            if (!forgotAlert) return;
            forgotAlert.hidden = !message;
            forgotAlert.innerHTML = message || '';
            forgotAlert.className = `auth-alert auth-alert-${type}`;
        };

        const escapeHtml = (value) => String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');

        const getResetLinks = (data) => {
            const resetUrl = data?.resetUrl || data?.url || data?.link || '';
            if (resetUrl) {
                return {
                    href: resetUrl,
                    display: resetUrl,
                };
            }

            if (!data?.resetToken) {
                return {
                    href: '',
                    display: '',
                };
            }

            const token = encodeURIComponent(data.resetToken);
            return {
                href: `reset-password.html?token=${token}`,
                display: `https://pageviewer.ru/reset-password.html?token=${token}`,
            };
        };

        const renderPasswordResetEmail = (data) => {
            const links = getResetLinks(data);
            const safeHref = escapeHtml(links.href);
            const safeDisplay = escapeHtml(links.display);
            const resetButton = links.href
                ? `<a href="${safeHref}" class="auth-button auth-button-link">Сбросить пароль</a>`
                : '';
            const fallbackLink = links.display
                ? `<p class="auth-dev-link">Если кнопка не открывается, используйте ссылку:<br><a class="auth-link" href="${safeHref}">${safeDisplay}</a></p>`
                : '';

            forgotForm.innerHTML = `
                <div></div>
                <div class="auth-alert auth-alert-success">Если email зарегистрирован, мы отправили ссылку для восстановления пароля. Ссылка действует 30 минут.</div>
                ${resetButton}
                ${fallbackLink}
                <a href="login.html" class="auth-secondary-button auth-button-link">Вернуться ко входу</a>
            `;
        };

        const setLoading = (isLoading) => {
            if (!forgotSubmit) return;
            forgotSubmit.disabled = isLoading;
            forgotSubmit.classList.toggle('is-loading', isLoading);
            forgotSubmit.textContent = isLoading ? 'Отправляем...' : 'Отправить ссылку';
        };

        const validateEmail = () => {
            const value = forgotEmailInput.value.trim();
            if (!value) {
                setError(forgotEmailInput, 'Введите email');
                return false;
            }
            if (!emailPattern.test(value)) {
                setError(forgotEmailInput, 'Введите корректный email');
                return false;
            }
            setError(forgotEmailInput, '');
            return true;
        };

        forgotEmailInput?.addEventListener('blur', validateEmail);
        forgotEmailInput?.addEventListener('input', () => {
            if (forgotEmailInput.classList.contains('is-invalid')) validateEmail();
        });

        forgotForm?.addEventListener('submit', (event) => {
            event.preventDefault();
            setFormAlert('');
            if (!validateEmail()) {
                return;
            }

            setLoading(true);
            window.PageViewerAuth.requestPasswordReset(forgotEmailInput.value.trim())
                .then((data) => {
                    renderPasswordResetEmail(data);
                })
                .catch((error) => {
                    const normalized = window.PageViewerAuth.normalizeError(error);
                    setFormAlert(normalized.message, 'error');
                })
                .finally(() => {
                    setLoading(false);
                });
        });
    </script>
</body>
</html>
