<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый пароль - PageViewer</title>
    <link rel="icon" type="image/x-icon" href="assets/page-viewer-logo.png">
    <link rel="stylesheet" href="style.css?v=5">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="auth-page text-gray-800">
    <main class="auth-main">
        <div class="auth-shell">
            <section class="auth-card">
                <a href="/" class="mb-8 flex items-center justify-center space-x-3 text-center">
                    <img src="assets/page-viewer-logo.png" alt="Логотип PageViewer" class="h-9 w-9">
                    <span class="text-2xl font-bold text-gray-800">PageViewer</span>
                </a>
                <div class="auth-panel">
                    <h2 class="auth-card-title text-center">Придумайте новый пароль</h2>

                    <form class="auth-form" data-reset-form>
                        <div class="auth-alert" data-form-alert hidden></div>

                        <label class="auth-field">
                            <span class="auth-label">Новый пароль</span>
                            <input class="auth-input" type="password" name="new-password" placeholder="Введите новый пароль" data-field="password">
                            <span class="auth-hint">Минимум 8 символов, хотя бы одна буква и одна цифра.</span>
                            <span class="auth-error" data-error-for="password"></span>
                        </label>

                        <label class="auth-field">
                            <span class="auth-label">Повтор пароля</span>
                            <input class="auth-input" type="password" name="new-password-repeat" placeholder="Повторите новый пароль" data-field="password-repeat">
                            <span class="auth-error" data-error-for="password-repeat"></span>
                        </label>

                        <button class="auth-button" type="submit">Сохранить пароль</button>

                        <p class="auth-footnote"><a href="login.html" class="auth-link">Вернуться ко входу</a></p>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        feather.replace();

        const resetForm = document.querySelector('[data-reset-form]');
        const passwordInput = resetForm?.querySelector('[data-field="password"]');
        const repeatInput = resetForm?.querySelector('[data-field="password-repeat"]');
        const submitButton = resetForm?.querySelector('[type="submit"]');
        const formAlert = resetForm?.querySelector('[data-form-alert]');
        const token = new URLSearchParams(window.location.search).get('token');
        const passwordPattern = /^(?=.*[A-Za-zА-Яа-яЁё])(?=.*\d).{8,}$/;

        const setError = (input, message) => {
            const error = resetForm?.querySelector(`[data-error-for="${input.dataset.field}"]`);
            input.classList.toggle('is-invalid', Boolean(message));
            if (error) {
                error.textContent = message || '';
                error.classList.toggle('is-visible', Boolean(message));
            }
        };

        const setFormAlert = (message, type = 'error') => {
            if (!formAlert) return;
            formAlert.hidden = !message;
            formAlert.innerHTML = message || '';
            formAlert.className = `auth-alert auth-alert-${type}`;
        };

        const setLoading = (isLoading) => {
            submitButton.disabled = isLoading;
            submitButton.classList.toggle('is-loading', isLoading);
            submitButton.textContent = isLoading ? 'Сохраняем...' : 'Сохранить пароль';
        };

        const validatePassword = () => {
            const value = passwordInput.value;
            if (!value) {
                setError(passwordInput, 'Введите пароль');
                return false;
            }
            if (!passwordPattern.test(value)) {
                setError(passwordInput, 'Пароль должен содержать минимум 8 символов, букву и цифру');
                return false;
            }
            setError(passwordInput, '');
            return true;
        };

        const validateRepeat = () => {
            const value = repeatInput.value;
            if (!value) {
                setError(repeatInput, 'Повторите пароль');
                return false;
            }
            if (value !== passwordInput.value) {
                setError(repeatInput, 'Пароли не совпадают');
                return false;
            }
            setError(repeatInput, '');
            return true;
        };

        if (!token) {
            setFormAlert('Ссылка восстановления некорректна: в ней нет токена.', 'error');
            submitButton.disabled = true;
        }

        passwordInput?.addEventListener('blur', validatePassword);
        passwordInput?.addEventListener('input', () => {
            if (passwordInput.classList.contains('is-invalid')) validatePassword();
            if (repeatInput.value) validateRepeat();
        });
        repeatInput?.addEventListener('blur', validateRepeat);
        repeatInput?.addEventListener('input', () => {
            if (repeatInput.classList.contains('is-invalid')) validateRepeat();
        });

        resetForm?.addEventListener('submit', async (event) => {
            event.preventDefault();
            setFormAlert('');
            if (!validatePassword() || !validateRepeat() || !token) return;

            setLoading(true);
            try {
                await window.PageViewerAuth.confirmPasswordReset(token, passwordInput.value);
                window.PageViewerAuth.clearTokens();
                resetForm.innerHTML = `
                    <div class="auth-alert auth-alert-success">Пароль изменен. Теперь можно войти с новым паролем.</div>
                    <a href="login.html" class="auth-button auth-button-link">Войти</a>
                `;
            } catch (error) {
                const normalized = window.PageViewerAuth.normalizeError(error);
                setFormAlert(normalized.message, 'error');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
