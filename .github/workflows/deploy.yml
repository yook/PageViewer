name: Deploy Site

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://pageviewer.ru
    concurrency:
      group: pageviewer-site-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive site
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            -czf site.tgz .

      - name: Upload archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: site.tgz
          target: /tmp

      - name: Publish production site
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            find "${{ secrets.DEPLOY_PATH }}" -mindepth 1 -maxdepth 1 ! -name '.well-known' -exec rm -rf {} +
            tar -xzf /tmp/site.tgz -C "${{ secrets.DEPLOY_PATH }}"
            rm -f /tmp/site.tgz
